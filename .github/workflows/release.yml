name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - run: strip target/${{ matrix.target }}/release/chatpeer-daemon

      - name: Package
        run: |
          ARCH=$(echo ${{ matrix.target }} | sed 's/-unknown-linux-musl//')
          mkdir -p chatpeer-${ARCH}-linux
          cp target/${{ matrix.target }}/release/chatpeer-daemon chatpeer-${ARCH}-linux/
          cp -r extension chatpeer-${ARCH}-linux/
          cp daemon/chatpeer.service chatpeer-${ARCH}-linux/
          cp install.sh chatpeer-${ARCH}-linux/
          tar czf chatpeer-${ARCH}-linux.tar.gz chatpeer-${ARCH}-linux/

      - uses: softprops/action-gh-release@v2
        with:
          files: chatpeer-*-linux.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
