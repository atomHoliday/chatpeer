name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - run: sudo apt-get update && sudo apt-get install -y musl-tools

      - run: cargo build --release --target x86_64-unknown-linux-musl

      - run: strip target/x86_64-unknown-linux-musl/release/chatpeer-daemon

      - name: Package
        run: |
          mkdir -p chatpeer-x86_64-linux
          cp target/x86_64-unknown-linux-musl/release/chatpeer-daemon chatpeer-x86_64-linux/
          cp -r extension chatpeer-x86_64-linux/
          cp daemon/chatpeer.service chatpeer-x86_64-linux/
          cp install.sh chatpeer-x86_64-linux/
          tar czf chatpeer-x86_64-linux.tar.gz chatpeer-x86_64-linux/

      - uses: softprops/action-gh-release@v2
        with:
          files: chatpeer-x86_64-linux.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
