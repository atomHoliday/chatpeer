name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - triple: x86_64-unknown-linux-musl
            arch: x86_64
            pkgs: musl-tools
          - triple: aarch64-unknown-linux-musl
            arch: aarch64
            pkgs: musl-tools gcc-aarch64-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - run: sudo apt-get update && sudo apt-get install -y ${{ matrix.target.pkgs }}

      - run: cargo build --release --target ${{ matrix.target.triple }}

      - name: Strip
        run: |
          if [ "${{ matrix.target.arch }}" = "aarch64" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target.triple }}/release/chatpeer-daemon
          else
            strip target/${{ matrix.target.triple }}/release/chatpeer-daemon
          fi

      - name: Package
        run: |
          DIR="chatpeer-${{ matrix.target.arch }}-linux"
          mkdir -p "$DIR"
          cp "target/${{ matrix.target.triple }}/release/chatpeer-daemon" "$DIR/"
          cp -r extension "$DIR/"
          cp daemon/chatpeer.service "$DIR/"
          cp install.sh "$DIR/"
          tar czf "$DIR.tar.gz" "$DIR/"

      - uses: softprops/action-gh-release@v2
        with:
          files: chatpeer-${{ matrix.target.arch }}-linux.tar.gz
          generate_release_notes: ${{ matrix.target.arch == 'x86_64' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
